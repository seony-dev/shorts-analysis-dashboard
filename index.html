<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Shorts Success Analysis Dashboard</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div id="root"></div>
    <script>
        // spa-github-pages 디코드 — 404.html 이 '?/video/1' 형태로 리다이렉트한 URL 을 원래 경로로 복원
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        })(window.location);
    </script>
    <script>
        // GitHub Pages 서브패스 대응 — 라우터/페치에 루트 경로로 보이게 함
        (function () {
            // 1) 라우터 베이스: 배포 환경에서만 붙임 (로컬은 '' 이라 기존 동작 유지)
            var BASE = (location.hostname.endsWith('github.io')) ? '/shorts-analysis-dashboard' : '';

            // wouter 의 pathname getter 를 패치된 번들이 여기로 호출함 — BASE 벗긴 값 반환
            window.__getPath__ = function () {
                var p = location.pathname;
                if (BASE && p.indexOf(BASE) === 0) {
                    return p.slice(BASE.length) || '/';
                }
                return p;
            };

            if (BASE) {
                // pushState/replaceState 에 BASE 자동 prepend (wouter 가 '/dashboard' 넘기면 실제 URL 은 '/shorts-analysis-dashboard/dashboard')
                function wrap(orig) {
                    return function (state, title, url) {
                        if (typeof url === 'string' && url.charAt(0) === '/'
                            && url.indexOf(BASE + '/') !== 0 && url !== BASE) {
                            url = BASE + url;
                        }
                        return orig.call(this, state, title, url);
                    };
                }
                history.pushState = wrap(history.pushState);
                history.replaceState = wrap(history.replaceState);
            }

            // 2) 데이터 페치 리다이렉트 — /videos_data.json 요청을 BASE/data/ 로 (절대경로, 서브라우트에서도 정확)
            var DATA_BASE = BASE + '/data';
            var originalFetch = window.fetch.bind(window);
            window.fetch = function (input, init) {
                var url = typeof input === 'string' ? input : (input && input.url);
                if (url === '/videos_data.json' || url === 'videos_data.json') {
                    return originalFetch(DATA_BASE + '/videos_data.json', init);
                }
                if (url === '/insights.json' || url === 'insights.json') {
                    return originalFetch(DATA_BASE + '/insights.json', init);
                }
                return originalFetch(input, init);
            };
        })();
    </script>
    <script src="./js/app.js"></script>
</body>
</html>
