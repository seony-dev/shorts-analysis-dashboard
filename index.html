<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Shorts Success Analysis Dashboard</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div id="root"></div>
    <script>
        // 앱이 /videos_data.json, /insights.json 을 fetch 하므로 ./data/ 로 리다이렉트
        (function () {
            const originalFetch = window.fetch.bind(window);
            window.fetch = function (input, init) {
                const url = typeof input === 'string' ? input : (input && input.url);
                if (url === '/videos_data.json' || url === 'videos_data.json') {
                    return originalFetch('./data/videos_data.json', init);
                }
                if (url === '/insights.json' || url === 'insights.json') {
                    return originalFetch('./data/insights.json', init);
                }
                return originalFetch(input, init);
            };
        })();
    </script>
    <script src="./js/app.js"></script>
</body>
</html>
