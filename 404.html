<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Redirecting…</title>
    <script>
        // spa-github-pages 트릭: 서브라우트로 들어온 요청을 베이스로 리다이렉트 (경로는 쿼리로 인코딩)
        // index.html 이 쿼리를 디코드해서 원래 경로로 replaceState 함
        (function (l) {
            var segmentsToKeep = 1; // /shorts-analysis-dashboard 부분 유지
            l.replace(
                l.protocol + '//' + l.host +
                l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
                l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        })(window.location);
    </script>
</head>
<body></body>
</html>
